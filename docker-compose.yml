services:
  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
  
  users-service:
    build:
      context: .
      dockerfile: ./services/users/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis

  worker-service:
    build:
      context: .
      dockerfile: ./services/worker/Dockerfile
    depends_on:
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - gateway

volumes:
  postgres_data: